# Конфигурация Nginx для сайта кассира (аналог Apache cashier.conf)
# Скопируйте в /etc/nginx/sites-available/loyalty
# Или используйте автоматический скрипт deploy_ubuntu.sh

# HTTP - перенаправление на HTTPS (аналог Apache RewriteRule)
server {
    listen 80;
    server_name optobuvfeo.ru www.optobuvfeo.ru;

    # Логи
    access_log /var/log/nginx/loyalty_access.log;
    error_log /var/log/nginx/loyalty_error.log;

    # Перенаправление на HTTPS (аналог Apache RewriteRule)
    return 301 https://$server_name$request_uri;
}

# HTTPS - основная конфигурация (аналог Apache VirtualHost *:443)
server {
    listen 443 ssl http2;
    server_name optobuvfeo.ru www.optobuvfeo.ru;

    # SSL сертификаты (после установки через certbot)
    # Let's Encrypt автоматически обновит эти пути
    ssl_certificate /etc/letsencrypt/live/optobuvfeo.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/optobuvfeo.ru/privkey.pem;
    
    # Если используете свои сертификаты (как в Apache):
    # ssl_certificate /etc/ssl/certs/certificate.crt;
    # ssl_certificate_key /etc/ssl/private/certificate.key;
    # ssl_trusted_certificate /etc/ssl/certs/certificate_ca.crt;

    # SSL настройки
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Логи (аналог Apache ErrorLog и CustomLog)
    access_log /var/log/nginx/loyalty_ssl_access.log combined;
    error_log /var/log/nginx/loyalty_ssl_error.log;

    # Максимальный размер загружаемого файла
    client_max_body_size 10M;

    # Проксирование на Waitress (аналог Apache ProxyPass)
    # Apache: ProxyPass / http://127.0.0.1:5000/
    location / {
        proxy_pass http://127.0.0.1:5000;
        
        # Заголовки (аналог Apache ProxyPreserveHost и RequestHeader)
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;
        
        # Таймауты
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # Буферизация (отключена для реального времени)
        proxy_buffering off;
        
        # WebSocket поддержка (если нужно)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Статические файлы (оптимизация)
    location /static/ {
        alias /opt/loyalty-bot/static/;  # Измените на ваш путь
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Favicon
    location = /favicon.ico {
        alias /opt/loyalty-bot/static/favicon.ico;
        access_log off;
        log_not_found off;
    }
}
